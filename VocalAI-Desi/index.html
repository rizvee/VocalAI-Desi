    <title>VocalAI Desi</title> <!-- Changed title -->
    <link rel="stylesheet" href="./index.css" />
  </head>
  <body>
    <div id="app">
      <div id="prompt-controllers-container"></div>
      <!-- You might need a play/pause button if not already part of PromptDJ -->
      <!-- <play-pause-button></play-pause-button> -->
      <!-- Toast message element for notifications -->
      <!-- <toast-message></toast-message> -->

    <script type="module">
      // Ensure all necessary Lit components are imported
      import './components/PromptController.ts';
      import './components/WeightKnob.ts';
      import './components/PlayPauseButton.ts'; // Assuming it exists as per original structure
      import './components/ToastMessage.ts';   // Assuming it exists

      import { VOCALAI_DESI_PROMPTS } from './config/prompts.ts'; // NEW IMPORT
      import { MidiDispatcher } from './utils/MidiDispatcher.ts'; // Import MidiDispatcher

      // Initialize MidiDispatcher
      // This assumes MidiDispatcher constructor handles its setup.
      const midiDispatcher = new MidiDispatcher();

      // Function to dynamically create and append prompt-controller elements
      function createPromptControllers() {
        const container = document.getElementById('prompt-controllers-container');
        if (!container) {
          console.error('Prompt controllers container not found!');
          return;
        }

        VOCALAI_DESI_PROMPTS.forEach(promptData => {
          const promptController = document.createElement('prompt-controller');
          promptController.promptId = promptData.promptId;
          promptController.text = promptData.text;
          promptController.weight = promptData.weight;
          promptController.cc = promptData.cc;
          promptController.color = promptData.color;
          promptController.midiDispatcher = midiDispatcher; // Pass the dispatcher
          container.appendChild(promptController);

          // Add event listener for when a prompt changes
          promptController.addEventListener('prompt-changed', (e) => {
            // Make sure 'e' is treated as CustomEvent and detail is properly typed if possible
            const updatedPrompt = (e as CustomEvent).detail;
            console.log('Prompt changed:', updatedPrompt);

            // THIS IS WHERE YOU'LL SEND THE PROMPT TO THE GEMINI API
            // You'll need to implement the logic for calling the Gemini API here,
            // using updatedPrompt.text and updatedPrompt.weight.
            // This will likely involve the @google/genai SDK and functions from utils/geminiApi.ts

            // Example (pseudocode for future integration with utils/geminiApi.ts):
            // import { generateMusicFromPrompt } from './utils/geminiApi.ts';
            // import { audioContext } from './main.ts'; // Or wherever your audio context is initialized
            /*
            if (audioContext) { // Ensure audioContext is available
              generateMusicFromPrompt(updatedPrompt.text, updatedPrompt.weight, audioContext)
                .then(audioBuffer => {
                  if (audioBuffer) {
                    // Play the audioBuffer
                    // This logic would also need to be defined, e.g., in a playback utility
                    console.log('Audio buffer received, ready to play.');
                  } else {
                    console.log('No audio buffer received.');
                  }
                })
                .catch(error => {
                  console.error('Error during music generation or processing:', error);
                });
            } else {
              console.error('AudioContext not available for music generation.');
            }
            */
          });
        });
      }

      // Call the function to create prompt controllers when the DOM is ready
      // Using DOMContentLoaded ensures the container element is available.
      document.addEventListener('DOMContentLoaded', () => {
        createPromptControllers();
        // Other initializations like setting up main audio context, etc., would go here.
        // For example, if PlayPauseButton or other components need global setup.
      });

      // Other app logic from PromptDJ MIDI might go here,
      // such as initializing the main audio context and connecting to the GenAI model.
      // You'll need to locate where the @google/genai model is initialized
      // and adapt it to use your GEMINI_API_KEY and send the prompts,
      // likely by calling functions from the upcoming utils/geminiApi.ts.
    </script>
  </body>
</html>
